version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - ATLASDB_URL=${ATLASDB_URL}
      - SECRET=${SECRET:-mysupersecretcode}
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379
      - RESEND_API_KEY=${RESEND_API_KEY}
      - GROK_API_KEY=${GROK_API_KEY}
    depends_on:
      - redis
    volumes:
      - backend-uploads:/app/public/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  backend-uploads:
  redis-data:
