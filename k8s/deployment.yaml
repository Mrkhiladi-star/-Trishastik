apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: trishastik-backend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: ATLASDB_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: atlasdb-url
        - name: SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: session-secret
        - name: REDIS_ENABLED
          value: "true"
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: RESEND_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: resend-api-key
        - name: GROK_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: grok-api-key
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: trishastik-frontend:latest
        ports:
        - containerPort: 80
